<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 포트폴리오</title>

        header {

            color: white;

        section {

            max-width: 800px;

            padding: 30px;

        }

        h2 {

        }

<body>

    <h1>이름</h1>
    <p>학생 | 개발자 지망생</p>
</header>

<section>
    <h2>소개</h2>
    <p>안녕하세요. 웹 개발을 공부하고 있습니다.</p>
</section>

<section>
    <h2>기술</h2>
    <p>HTML, CSS, JavaScript</p>
</section>

<section>
    <h2>프로젝트</h2>
    <p>첫 번째 웹사이트 제작</p>
</section>

<section>
    <h2>연락처</h2>
    <p>email@example.com</p>
</section>

</body>
</html>
